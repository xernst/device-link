# Device Link — tmux config for helper machines

# Use 256 colors
set -g default-terminal "screen-256color"

# Increase scrollback
set -g history-limit 50000

# Start window numbering at 1
set -g base-index 1
setw -g pane-base-index 1

# Renumber windows when one is closed
set -g renumber-windows on

# Status bar
set -g status-style "bg=colour235,fg=colour136"
set -g status-left "#[fg=colour46,bold] #S "
set -g status-right "#[fg=colour244] %H:%M | #(tailscale ip -4 2>/dev/null || echo 'no-ts') "
set -g status-left-length 30
set -g status-right-length 50

# Active window highlight
setw -g window-status-current-style "fg=colour166,bold"

# Mouse support (for when you SSH in from a GUI terminal)
set -g mouse on

# Don't wait for escape sequences (faster key response)
set -sg escape-time 0

# Activity monitoring
setw -g monitor-activity on
set -g visual-activity off
